, Arial, sans-serif" font-size="58" font-weight="700" fill="#173423">DeLaney Farm</text><text x="92" y="258" font-family="DM Sans, Arial, sans-serif" font-size="24" fill="#5c6a61">Nearby trail context, without leaving the park page.</text><text x="92" y="330" font-family="DM Sans, Arial, sans-serif" font-size="19" fill="#5f6d64">Use this as a utility slide in the gallery: real photos first, then a clean map card showing where trail access sits relative to the park.</text><circle cx="112" cy="434" r="8" fill="#f4ca3d"/><text x="132" y="440" font-family="DM Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#173423">Park location</text><rect x="104" y="472" width="36" height="10" rx="5" fill="#2f6d49"/><text x="156" y="482" font-family="DM Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#173423">Nearby trail geometry</text><text x="92" y="560" font-family="DM Sans, Arial, sans-serif" font-size="17" fill="#728076">Sample generated from local trail data already in the project.</text><text x="92" y="590" font-family="DM Sans, Arial, sans-serif" font-size="17" fill="#728076">Best used as an extra gallery card, not a replacement for photography.</text><rect x="642" y="118" width="154" height="34" rx="17" fill="#ffffff" opacity="0.92"/><text x="666" y="140" font-family="DM Sans, Arial, sans-serif" font-size="14" font-weight="700" fill="#2f6d49">MAP SNAPSHOT</text><rect x="782" y="650" width="286" height="42" rx="21" fill="#ffffff" opacity="0.94"/><text x="812" y="676" font-family="DM Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#173423">Yellow dot = park</text></svg>