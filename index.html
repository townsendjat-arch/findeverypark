<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FindEveryPark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2f5f43;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px 20px;
    }

    .container {
      max-width: 650px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      margin: 0 0 18px;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 16px 28px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      background: white;
      color: #2f5f43;
      transition: 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FindEveryPark</h1>

    <p>Discover parks, trails, and outdoor spaces near you.</p>

    <p>
      FindEveryPark is building the simplest way for families
      to explore parks city by city.
    </p>

    <a class="button" href="https://auroraparksfinder.com">
      Explore Aurora Parks
    </a>
  </div>
</body>
</html>
