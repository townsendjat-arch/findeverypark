<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const requestedId = (params.get("id") || "").trim();
  const legacyParkKey = (params.get("park") || "").trim();
  const legacyName = (params.get("name") || "").trim();
  const DATASET_KEY = window.ACTIVE_DATASET_KEY || (window.PARK_SITE && window.PARK_SITE.defaultDataset) || "aurora";
  const DATASET_META = (window.PARK_SITE && window.PARK_SITE.datasetsMeta && window.PARK_SITE.datasetsMeta[DATASET_KEY]) || {
    city: "Aurora",
    state: "CO",
    stateName: "Colorado",
    brandName: (window.SITE_CONFIG && window.SITE_CONFIG.brandName) || "Find Every Park Colorado"
  };
  const DEFAULT_OG_IMAGE = "https://findeverypark.com/images/aurora-parks-hero.png";
  const FEATURE_LABELS = {
    playground: "Playground",
    pickleball: "Pickleball",
    tennis: "Tennis",
    basketball: "Basketball",
    baseball: "Baseball/Softball",
    soccer: "Soccer",
    volleyball: "Volleyball",
    pool: "Pool",
    sprayground: "Splash Pad",
    dog_park: "Dog Park",
    trails: "Trails",
    fishing: "Fishing",
    disc_golf: "Disc Golf",
    skate: "Skate/BMX",
    golf: "Golf Course",
    garden: "Community Garden",
    boating: "Boating",
    restroom: "Restrooms",
    shelter: "Shelter"
  };

  const statusEl = document.getElementById("park-status");
  const headerImgEl = document.getElementById("park-header-image");
  const mapEl = document.getElementById("park-map");
  const mapStatusEl = document.getElementById("park-map-status");
  const photosEl = document.getElementById("park-photos");
  const answersEl = document.getElementById("park-answers");
  const featuresEl = document.getElementById("park-features");
  const featureLinksEl = document.getElementById("park-feature-links");
  const nearbyLinksEl = document.getElementById("nearby-links");
  const directionsBtn = document.getElementById("directions-btn");
  let mapInstance = null;

  function waitForDatasetReady(datasetKey) {
    const loadPromise = window.DATASET_LOAD_PROMISE || Promise.resolve();
    return loadPromise
      .catch(() => null)
      .then(() => window.waitForParkDataset(datasetKey, { timeout: 5000 }));
  }

  function setStaticNav() {
    document.getElementById("crumb-home").href = "index.html?dataset=" + encodeURIComponent(DATASET_KEY);
    document.getElementById("crumb-city").href = "city.html?dataset=" + encodeURIComponent(DATASET_KEY);
    document.getElementById("crumb-city").textContent = DATASET_META.city + " City Guide";
    document.getElementById("back-link").href = "parks.html?dataset=" + encodeURIComponent(DATASET_KEY);
    document.getElementById("back-link").textContent = DATASET_META.city + " Parks Map";
    document.getElementById("park-location").textContent = DATASET_META.city + ", " + DATASET_META.stateName;
    document.getElementById("park-eyebrow").textContent = DATASET_META.city + " park guide";
  }

  function slugify(value) {
    return window.slugifyParkValue ? window.slugifyParkValue(value) : String(value || "").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }

  function stripHtml(value) {
    return String(value || "")
      .replace(/<br\s*\/?>/gi, " ")
      .replace(/<[^>]+>/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function firstSentence(value) {
    const text = stripHtml(value);
    if (!text) {
      return "";
    }

    const match = text.match(/.+?[.!?](\s|$)/);
    return (match ? match[0] : text).trim();
  }

  function formatPlace(address) {
    if (!address) {
      return DATASET_META.city + ", " + DATASET_META.state;
    }

    return address.toLowerCase().includes(DATASET_META.city.toLowerCase())
      ? address
      : address + ", " + DATASET_META.city + ", " + DATASET_META.state;
  }

  function parkGuideUrl(park) {
    const search = new URLSearchParams();
    search.set("dataset", DATASET_KEY);
    search.set("id", park.id || park.n || "");
    return "https://findeverypark.com/park.html?" + search.toString();
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function getCoords(park) {
    if (typeof park.lat === "number" && typeof park.lng === "number") {
      return [park.lat, park.lng];
    }

    const datasetCoords = (window.PARK_COORDS && window.PARK_COORDS[DATASET_KEY]) || {};
    return datasetCoords[park.name || park.n] || null;
  }

  function formatAcreage(park) {
    const acreage = Number(park.acreage || park.ac || 0);
    return acreage > 0 ? acreage.toLocaleString() + " acres" : "Not listed yet";
  }

  function featureKeys(park) {
    return Object.keys(park.features || park.f || {}).filter((key) => park.features ? park.features[key] : park.f[key]);
  }

  function hasDescriptionKeyword(park, pattern) {
    return pattern.test(stripHtml(park.description || park.d || ""));
  }

  function buildConfirmedHighlights(park) {
    const features = park.features || park.f || {};
    const highlights = [];

    if (features.playground) {
      highlights.push({ label: "Playground", value: "Yes" });
    }

    if (features.trails) {
      highlights.push({ label: "Trails", value: "Available" });
    }

    if (features.restroom) {
      highlights.push({ label: "Bathrooms", value: "Available" });
    }

    if (features.dog_park) {
      highlights.push({ label: "Dog Park", value: "Available" });
    }

    if (features.shelter) {
      highlights.push({ label: "Shelter", value: "Available" });
    }

    if (features.pool) {
      highlights.push({ label: "Pool", value: "Available" });
    }

    if (features.sprayground) {
      highlights.push({ label: "Splash Pad", value: "Available" });
    }

    if (features.fishing) {
      highlights.push({ label: "Fishing", value: "Available" });
    }

    if (features.boating) {
      highlights.push({ label: "Boating", value: "Available" });
    }

    if (features.golf) {
      highlights.push({ label: "Golf Course", value: "Available" });
    }

    if (features.disc_golf) {
      highlights.push({ label: "Disc Golf", value: "Available" });
    }

    if (features.skate) {
      highlights.push({ label: "Skate Area", value: "Available" });
    }

    if (features.tennis) {
      highlights.push({ label: "Tennis", value: "Available" });
    }

    if (features.pickleball) {
      highlights.push({ label: "Pickleball", value: "Available" });
    }

    if (features.basketball) {
      highlights.push({ label: "Basketball", value: "Available" });
    }

    if (features.baseball) {
      highlights.push({ label: "Baseball/Softball", value: "Available" });
    }

    if (features.soccer) {
      highlights.push({ label: "Soccer", value: "Available" });
    }

    if (features.volleyball) {
      highlights.push({ label: "Volleyball", value: "Available" });
    }

    return highlights.filter((item) => item && item.label && item.value);
  }

  function buildSummary(park) {
    const sentence = firstSentence(park.description || park.d || "");
    if (sentence) {
      return sentence;
    }

    const acreage = Number(park.acreage || park.ac || 0);
    const labels = featureKeys(park).slice(0, 3).map((key) => FEATURE_LABELS[key] || key.replace(/_/g, " "));
    const typeLabel = labels.length ? labels.join(", ").toLowerCase() : "general park access";
    if (acreage > 0) {
      return (park.name || park.n) + " is a " + acreage.toLocaleString() + "-acre park in " + DATASET_META.city + " with " + typeLabel + ".";
    }

    return (park.name || park.n) + " is a park in " + DATASET_META.city + " with " + typeLabel + ".";
  }

  function buildDirectionsUrl(park, coords) {
    if (coords) {
      return "https://www.google.com/maps/dir/?api=1&destination=" + coords[0] + "," + coords[1];
    }

    return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent((park.name || park.n || "Park") + " " + DATASET_META.city + " " + DATASET_META.stateName);
  }

  function renderAnswers(park) {
    const sectionEl = document.getElementById("answers-section");
    const items = buildConfirmedHighlights(park);

    if (!items.length) {
      sectionEl.style.display = "none";
      answersEl.innerHTML = "";
      return;
    }

    sectionEl.style.display = "";
    answersEl.innerHTML = items.map((item) => {
      return '<article class="answer-card">' +
        '<h3>' + escapeHtml(item.label) + '</h3>' +
        '<p>' + escapeHtml(item.value) + '</p>' +
      '</article>';
    }).join("");
  }

  function renderFeatures(park) {
    const keys = featureKeys(park);
    featuresEl.innerHTML = "";
    featureLinksEl.innerHTML = "";

    if (!keys.length) {
      featuresEl.innerHTML = '<p class="empty-copy">Feature details are still being added.</p>';
      return;
    }

    keys.forEach((feature) => {
      const badge = document.createElement("span");
      badge.className = "feature-badge";
      badge.textContent = FEATURE_LABELS[feature] || feature.replace(/_/g, " ");
      featuresEl.appendChild(badge);
    });

    keys.slice(0, 4).forEach((feature) => {
      const link = document.createElement("a");
      link.className = "feature-link";
      link.href = "parks.html?dataset=" + encodeURIComponent(DATASET_KEY) + "&filter=" + encodeURIComponent(feature);
      link.textContent = "See more " + (FEATURE_LABELS[feature] || feature.replace(/_/g, " ")).toLowerCase() + " parks in " + DATASET_META.city;
      featureLinksEl.appendChild(link);
    });
  }

  function haversineMiles(aLat, aLng, bLat, bLng) {
    const toRad = function (value) { return value * Math.PI / 180; };
    const earthRadius = 3958.8;
    const dLat = toRad(bLat - aLat);
    const dLng = toRad(bLng - aLng);
    const lat1 = toRad(aLat);
    const lat2 = toRad(bLat);
    const angle = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
    return earthRadius * 2 * Math.atan2(Math.sqrt(angle), Math.sqrt(1 - angle));
  }

  function renderNearbyParks(park, parks, coords) {
    nearbyLinksEl.innerHTML = "";

    if (!coords) {
      nearbyLinksEl.innerHTML = '<p class="empty-copy">Nearby park links will appear here when coordinates are available.</p>';
      return;
    }

    const matches = parks
      .filter((candidate) => candidate.id !== park.id)
      .map((candidate) => {
        const candidateCoords = getCoords(candidate);
        if (!candidateCoords) {
          return null;
        }

        return {
          park: candidate,
          distance: haversineMiles(coords[0], coords[1], candidateCoords[0], candidateCoords[1])
        };
      })
      .filter(Boolean)
      .sort((a, b) => a.distance - b.distance)
      .slice(0, 3);

    if (!matches.length) {
      nearbyLinksEl.innerHTML = '<p class="empty-copy">Nearby park links will appear here when more location data is available.</p>';
      return;
    }

    matches.forEach((match) => {
      const link = document.createElement("a");
      link.className = "nearby-link";
      link.href = "park.html?dataset=" + encodeURIComponent(DATASET_KEY) + "&id=" + encodeURIComponent(match.park.id || match.park.n);
      link.textContent = match.park.n + " (" + match.distance.toFixed(1) + " mi)";
      nearbyLinksEl.appendChild(link);
    });
  }

  function setMeta(name, content) {
    const el = document.getElementById(name);
    if (el) {
      el.setAttribute("content", content);
    }
  }

  function setSchema(id, data) {
    const el = document.getElementById(id);
    if (el) {
      el.textContent = JSON.stringify(data);
    }
  }

  function updateSchemas(park, coords, summary, pageUrl, imageUrl) {
    setSchema("breadcrumb-schema", {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://findeverypark.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": DATASET_META.city + " City Guide",
          "item": "https://findeverypark.com/city.html?dataset=" + encodeURIComponent(DATASET_KEY)
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": DATASET_META.city + " Parks",
          "item": "https://findeverypark.com/parks.html?dataset=" + encodeURIComponent(DATASET_KEY)
        },
        {
          "@type": "ListItem",
          "position": 4,
          "name": park.name || park.n,
          "item": pageUrl
        }
      ]
    });

    const amenityFeature = featureKeys(park).map((feature) => ({
      "@type": "LocationFeatureSpecification",
      "name": FEATURE_LABELS[feature] || feature.replace(/_/g, " "),
      "value": true
    }));

    const schema = {
      "@context": "https://schema.org",
      "@type": "Place",
      "name": park.name || park.n,
      "description": summary,
      "url": pageUrl,
      "isPartOf": {
        "@type": "WebSite",
        "name": DATASET_META.brandName,
        "url": "https://findeverypark.com/"
      },
      "containedInPlace": {
        "@type": "City",
        "name": DATASET_META.city
      }
    };

    if (park.address || park.a) {
      schema.address = {
        "@type": "PostalAddress",
        "streetAddress": park.address || park.a,
        "addressLocality": DATASET_META.city,
        "addressRegion": DATASET_META.state,
        "addressCountry": "US"
      };
    }

    if (coords) {
      schema.geo = {
        "@type": "GeoCoordinates",
        "latitude": coords[0],
        "longitude": coords[1]
      };
    }

    if (imageUrl) {
      schema.image = imageUrl;
    }

    if (amenityFeature.length) {
      schema.amenityFeature = amenityFeature;
    }

    setSchema("place-schema", schema);
  }

  function renderMap(park, coords) {
    if (!coords) {
      mapEl.style.display = "none";
      mapStatusEl.textContent = "Map coordinates are not available for this park yet.";
      return;
    }

    mapEl.style.display = "";
    mapStatusEl.textContent = "";

    if (mapInstance) {
      mapInstance.remove();
    }

    mapInstance = L.map("park-map").setView(coords, 16);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(mapInstance);

    L.marker(coords).addTo(mapInstance)
      .bindPopup((park.name || park.n) + "<br>" + escapeHtml(formatPlace(park.address || park.a || "")))
      .openPopup();
  }

  function renderPhotos(park) {
    photosEl.innerHTML = "";
    const gallery = Array.isArray(park.photoGallery) && park.photoGallery.length ? park.photoGallery : [];

    headerImgEl.style.display = "none";
    headerImgEl.removeAttribute("src");

    if (park.heroPhoto && park.heroPhoto.src) {
      headerImgEl.src = park.heroPhoto.src;
      headerImgEl.alt = park.heroPhoto.alt || ((park.name || park.n) + " photo");
      headerImgEl.onerror = function () {
        headerImgEl.style.display = "none";
      };
      headerImgEl.onload = function () {
        headerImgEl.style.display = "";
      };
    }

    gallery.forEach((photo) => {
      if (!photo || !photo.src) {
        return;
      }

      const img = document.createElement("img");
      img.src = photo.src;
      img.alt = photo.alt || ((park.name || park.n) + " photo");
      img.loading = "lazy";
      img.onerror = function () {
        img.remove();
        if (!photosEl.children.length) {
          photosEl.innerHTML = "<p class='empty-copy'>Photos are not available for this park yet.</p>";
        }
      };
      photosEl.appendChild(img);
    });

    if (!gallery.length) {
      photosEl.innerHTML = "<p class='empty-copy'>Photos are not available for this park yet.</p>";
    }
  }

  function renderNotFound(message) {
    document.title = "Park Not Found | " + DATASET_META.brandName;
    document.getElementById("canonical-link").href = "https://findeverypark.com/park.html?dataset=" + encodeURIComponent(DATASET_KEY);
    setMeta("og-title", document.title);
    setMeta("twitter-title", document.title);
    setMeta("og-description", message);
    setMeta("twitter-description", message);
    setMeta("page-description", message);
    setMeta("og-url", "https://findeverypark.com/park.html?dataset=" + encodeURIComponent(DATASET_KEY));
    document.getElementById("park-name").textContent = "Park Not Found";
    document.getElementById("crumb-current").textContent = "Park Not Found";
    document.getElementById("park-summary").textContent = message;
    document.getElementById("park-address").textContent = "Check the shared link or browse the city park map.";
    document.getElementById("park-acreage").textContent = "Not available";
    document.getElementById("park-description").innerHTML = "<p>" + escapeHtml(message) + "</p><p><a href='parks.html?dataset=" + encodeURIComponent(DATASET_KEY) + "'>Browse " + escapeHtml(DATASET_META.city) + " parks</a></p>";
    directionsBtn.style.display = "none";
    mapEl.style.display = "none";
    mapStatusEl.textContent = "";
    photosEl.innerHTML = "<p class='empty-copy'>No photos to show for this URL.</p>";
    document.getElementById("answers-section").style.display = "none";
    answersEl.innerHTML = "";
    featuresEl.innerHTML = "<p class='empty-copy'>Try opening the park from the city browse page.</p>";
    featureLinksEl.innerHTML = "";
    nearbyLinksEl.innerHTML = "<a class='nearby-link' href='parks.html?dataset=" + encodeURIComponent(DATASET_KEY) + "'>Back to " + escapeHtml(DATASET_META.city) + " parks</a>";
    statusEl.textContent = message;
    statusEl.className = "status-message error";
    setSchema("breadcrumb-schema", {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": []
    });
    setSchema("place-schema", {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Park Not Found",
      "url": "https://findeverypark.com/park.html?dataset=" + encodeURIComponent(DATASET_KEY)
    });
  }

  function renderPark(park, parks) {
    const coords = getCoords(park);
    const pageUrl = parkGuideUrl(park);
    const summary = buildSummary(park);
    const descriptionText = stripHtml(park.description || park.d || "");
    const metaDescription = summary.slice(0, 155);
    const imageUrl = park.heroPhoto && park.heroPhoto.src
      ? new URL(park.heroPhoto.src, window.location.origin).href
      : DEFAULT_OG_IMAGE;

    document.title = (park.name || park.n) + " Park Guide | " + DATASET_META.brandName;
    document.getElementById("page-description").setAttribute("content", metaDescription);
    document.getElementById("canonical-link").href = pageUrl;
    setMeta("og-title", document.title);
    setMeta("twitter-title", document.title);
    setMeta("og-description", metaDescription);
    setMeta("twitter-description", metaDescription);
    setMeta("og-url", pageUrl);
    setMeta("og-image", imageUrl);
    setMeta("twitter-image", imageUrl);

    document.getElementById("park-name").textContent = park.name || park.n || "";
    document.getElementById("crumb-current").textContent = park.name || park.n || "";
    document.getElementById("park-location").textContent = formatPlace(park.address || park.a || "");
    document.getElementById("park-summary").textContent = summary;
    document.getElementById("park-address").textContent = formatPlace(park.address || park.a || "");
    document.getElementById("park-acreage").textContent = formatAcreage(park);
    document.getElementById("park-description").innerHTML = (park.description || park.d)
      ? String(park.description || park.d).replace(/\n/g, "<br>")
      : "<p class='empty-copy'>Park notes are coming soon.</p>";

    directionsBtn.style.display = "inline-block";
    directionsBtn.href = buildDirectionsUrl(park, coords);

    renderMap(park, coords);
    renderPhotos(park);
    renderAnswers(park);
    renderFeatures(park);
    renderNearbyParks(park, parks, coords);
    updateSchemas(park, coords, descriptionText || summary, pageUrl, imageUrl);

    statusEl.textContent = "";
    statusEl.style.display = "none";

    const canonicalId = String(park.id || "");
    if (canonicalId && (requestedId !== canonicalId || params.get("park") || params.get("name"))) {
      const canonicalParams = new URLSearchParams();
      canonicalParams.set("dataset", DATASET_KEY);
      canonicalParams.set("id", canonicalId);
      const canonicalPath = window.location.pathname + "?" + canonicalParams.toString();
      window.history.replaceState({}, "", canonicalPath);
    }
  }

  function resolvePark(parks) {
    const normalizedId = requestedId || legacyParkKey;
    if (normalizedId) {
      const byId = window.findParkByIdInDataset
        ? window.findParkByIdInDataset(DATASET_KEY, normalizedId)
        : parks.find((park) => String(park.id || "").toLowerCase() === normalizedId.toLowerCase());
      if (byId) {
        return byId;
      }
    }

    if (legacyName && window.findParkInDataset) {
      const byName = window.findParkInDataset(DATASET_KEY, legacyName);
      if (byName) {
        return byName;
      }
    }

    return null;
  }

  setStaticNav();

  if (!requestedId && !legacyParkKey && !legacyName) {
    renderNotFound("This park link is missing a park ID, so we could not load a mini guide.");
    return;
  }

  waitForDatasetReady(DATASET_KEY)
    .then((parks) => {
      const park = resolvePark(parks);
      if (!park) {
        const datasetMessage = window.REQUESTED_DATASET_INVALID
          ? " The requested dataset was not available, so we loaded " + DATASET_META.city + " instead."
          : "";
        renderNotFound("We could not find that park in the " + DATASET_META.city + " dataset." + datasetMessage);
        return;
      }

      renderPark(park, parks);
    })
    .catch(() => {
      renderNotFound("Park data did not load in time. Please reload the page or return to the city parks map.");
    });
})();
</script>
</body>
</html>
